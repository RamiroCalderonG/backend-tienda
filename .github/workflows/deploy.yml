name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Sync código a /home/tienda/app
        run: |
          rsync -av --delete \
            --exclude=venv \
            --exclude=__pycache__ \
            --exclude=.git \
            --exclude='*.pyc' \
            ./ /home/tienda/app/

      - name: Instalar dependencias
        run: /home/tienda/app/venv/bin/pip install -r /home/tienda/app/requirements.txt

      - name: Reiniciar backend
        run: sudo systemctl restart tienda-back.service