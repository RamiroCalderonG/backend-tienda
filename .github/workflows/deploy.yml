name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /home/tienda/app
          git pull origin main

      - name: Install dependencies
        run: |
          cd /home/tienda/app
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Restart service
        run: sudo systemctl restart tienda-back
